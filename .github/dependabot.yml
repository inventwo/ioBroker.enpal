# Dependabot will run on day 18 of each month at 02:54 (Europe/Berlin timezone)
version: 2
updates:

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'cron'
      cron: '5 4 * * 1'
      timezone: 'Europe/Berlin'
    open-pull-requests-limit: 15
    assignees:
      - 'inventwo'
    versioning-strategy: 'increase'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'cron'
      cron: '15 4 * * 1'
      timezone: 'Europe/Berlin'
    open-pull-requests-limit: 15
    assignees:
      - 'inventwo'
